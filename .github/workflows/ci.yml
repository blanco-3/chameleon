name: Chameleon CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Noir circuit ──────────────────────────────────────────────────────────────
  circuit:
    name: Noir circuit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install noirup
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH

      - name: Install nargo
        run: noirup

      - name: Install bbup
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> $GITHUB_PATH

      - name: Install bb
        run: bbup

      - name: Compile circuit
        run: make build-circuit

      - name: Run nargo tests
        run: make test-circuit

      - name: Generate proof (sample witness)
        run: make gen-vk

  # ── Soroban contracts ─────────────────────────────────────────────────────────
  contracts:
    name: Soroban contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run contract tests (mock verifier)
        run: make test-contracts

      - name: Build for wasm32v1-none
        run: make build-contracts-mock

  # ── TypeScript CLI / crypto consistency ───────────────────────────────────────
  cli:
    name: CLI and crypto tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: TypeScript type check
        run: cd cli && npx tsc --noEmit

      - name: Run cross-implementation crypto test
        run: make test-crypto

  # ── Full suite ────────────────────────────────────────────────────────────────
  all:
    name: All checks pass
    needs: [circuit, contracts, cli]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed!"
